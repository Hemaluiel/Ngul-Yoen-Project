<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

/* NAVBAR */
.navbar {

    background: linear-gradient(90deg, #d32f2f, #fbc02d);

.logo { font-size: 26px; font-weight: bold; }

.hero {

    padding: 60px 20px;
    background: linear-gradient(135deg, #d32f2f, #7b1fa2);

/* CONTAINER */
.container {

    max-width: 1100px;
    margin: auto;

/* CARD */
.card {
    background: linear-gradient(135deg, #ffffff, #fce4ec);
    padding: 30px;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    text-align: center;
    transition: all 0.35s ease;
}

.card:hover {
    transform: translateY(-8px);
}

/* BUTTON */
.btn {
    margin-top: 15px;
    padding: 12px 22px;
    background: linear-gradient(135deg, #ff5252, #ffca28);
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.btn:hover {
    transform: scale(1.05);
}

/* DASHBOARD */
#dashboard {
    display: none;
    margin-top: 30px;
}

.stats {
    display: flex;
    justify-content: space-around;
    margin-bottom: 20px;
}

.stat-box {
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    width: 30%;
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

footer {
    text-align: center;
    padding: 20px;
    background: #2c3e50;
    color: white;
}

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Ngul~Yoen</div>
    <div class="nav-links">
        <a href="/phase3/hm.html">Home</a>
        <a href="/phase3/ab1.html">About</a>
        <a href="/phase3/rd2.html">Report</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Expense Analyzer</h1>
    <p>Upload your bank statement and discover your spending patterns</p>
</div>

<div class="container">

    <!-- UPLOAD CARD -->
    <div class="card">
        <h2>📂 Upload Bank Statement</h2>
        <p>Select your PDF file to analyze your expenses</p>

        <input type="file" id="fileInput" accept="application/pdf">
        <br>
        <button class="btn" onclick="analyzePDF()">Analyze</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="card">
        <h2>📊 Expense Dashboard</h2>

        <div class="stats">
            <div class="stat-box">
                <h3>Total Debit</h3>
                <p id="totalDebit">0</p>
            </div>
            <div class="stat-box">
                <h3>Top Category</h3>
                <p id="topCategory">-</p>
            </div>
            <div class="stat-box">
                <h3>Categories</h3>
                <p id="numCategories">0</p>
            </div>
        </div>

        <canvas id="pieChart"></canvas>
        <div id="topExpenses"></div>
    </div>

</div>

<footer>
    <p>© 2026 Ngul Yoen | Expense Insights</p>
</footer>

<script>
function analyzePDF() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Upload a PDF first");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    // fetch("http://127.0.0.1:5000/analyze", {
    fetch("https://your-app-name.onrender.com/analyze", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        showDashboard(data.categories);
        showTopExpenses(data.top5);
    })
    // .then(data => {
    //     showDashboard(data.categories);
    // })
    .catch(err => console.error(err));
}

function showDashboard(data) {
    document.getElementById("dashboard").style.display = "block";

    let total = Object.values(data).reduce((a, b) => a + b, 0);

    document.getElementById("totalDebit").innerText = total.toFixed(2);

    let topCategory = Object.keys(data).reduce((a, b) =>
        data[a] > data[b] ? a : b
    );

    document.getElementById("topCategory").innerText = topCategory;
    document.getElementById("numCategories").innerText = Object.keys(data).length;

    // Calculate percentages
    let labels = [];
    let values = [];

    for (let key in data) {
        let percent = ((data[key] / total) * 100).toFixed(1);
        labels.push(`${key} (${percent}%)`);
        values.push(data[key]);
    }

    const ctx = document.getElementById("pieChart").getContext("2d");

    if (window.myChart) {
        window.myChart.destroy(); // prevent duplicate charts
    }

    window.myChart = new Chart(ctx, {
        type: "pie",
        data: {
            labels: labels,
            datasets: [{
                data: values
            }]
        }
    });
}

function showTopExpenses(top5) {
    let html = "<h3>Top 5 Expenses</h3>";

    top5.forEach(t => {
        html += `<p>💸 ${t.name} - ${t.amount}</p>`;
    });

    document.getElementById("topExpenses").innerHTML = html;
}

</script>
