<!DOCTYPE html>
<html>
<head>
<title>My First Website</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f0f8ff;
    text-align: center;
    margin: 0;
}

header{
    background-color: #2c3e50;
    color: white;
    padding: 20px;
}

section{
    margin: 30px;
}

ul{
    list-style-type: none;
    padding: 0;
}

li{
    background-color: #42185a;
    color: white;
    padding: 10px;
    margin: 5px;
    width: 200px;
    margin-left: auto;
    margin-right: auto;
    border-radius: 5px;
}

button{
    padding: 10px 20px;
    font-size: 16px;
    background-color: #d2bbdb;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover{
    background-color: #8773a3;
}
</style>

</head>

<body>

<header>
<h1>Welcome to My Website</h1>
</header>

<section>

<p>My name is <b>Hema</b>.</p>
<p>I am learning HTML, CSS, and JavaScript.</p>

<h2>My Interests</h2>

<ul>
<li>Data Science</li>
<li>Machine Learning</li>
<li>Business Intelligence</li>
</ul>

<br>

<button onclick="showMessage()">Click Me</button>

</section>

<script>
function showMessage(){
    alert("Hello Hema! Keep learning Web Development 🚀");
}
</script>

</body>
</html>
