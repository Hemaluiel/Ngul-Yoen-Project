<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Ngul Yoen</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(120deg, #fce4ec, #fff9c4);
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: #2c3e50;
    /* linear-gradient(90deg, #d32f2f, #fbc02d); */
    color: white;
    position: sticky;
    top: 0;
}

.logo {
    display:flex;
    align-items:center;
    gap:10px;
    font-size: 24px;
    font-weight: bold;
}

.logo img { height:40px; }

.nav-links a {
    color: white;
    margin: 0 12px;
    text-decoration: none;
    font-weight: bold;
}

.nav-links a:hover { opacity:0.7; }

/* HERO */
header {
    text-align: center;
    padding: 60px 20px;
    background: linear-gradient(135deg, #d32f2f, #7b1fa2);
    color: white;
}

/* CONTACT CARD */
.container {
    max-width: 800px;
    margin: 40px auto;
    padding: 20px;
}

.contact-card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
    position: relative;
}

.contact-card::before {
    content:"";
    position:absolute;
    top:0; left:0;
    width:100%;
    height:5px;
    background: linear-gradient(90deg,#ff5252,#ffca28);
}

.contact-item {
    margin: 15px 0;
    font-size: 16px;
    color: #444;
}

.icon {
    font-size: 22px;
    margin-right: 8px;
}

/* FORM */
form {
    margin-top: 25px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    background: linear-gradient(135deg,#ff5252,#ffca28);
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}

button:hover { 
    /* transform: scale(1.05);  */
    box-shadow: 0 0 25px rgba(255, 82, 82, 0.6);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #2c3e50;
    color: white;
}

footer a { color:white; margin:10px; text-decoration:none; }

</style>
</head>

<body>

<div class="navbar">
    <div class="logo">
        <img src="logo.png"> Ngul~Yoen
    </div>
    <div class="nav-links">
        <a href="Ngul Yoen.html">Home</a>
        <a href="About.html">About</a>
        <a href="Report.html">Report</a>
        <a href="Findings.html">Findings</a>
    </div>
</div>

<header>
    <h1>Contact Us</h1>
    <p>Reach out for insights, collaboration, or queries</p>
</header>

<div class="container">

<div class="contact-card">
    <h2>📬 Get in Touch</h2>
    <div class="contact-item">📧 Email: info@ngulyoen.bds.bt</div>
    <div class="contact-item">📞 Phone: +975 12345678</div>
    <div class="contact-item">📍 Address: Olakha, Thimphu, Bhutan</div>

    <!-- <form onsubmit="event.preventDefault(); alert('Message sent!');">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea rows="4" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form> -->

    <form onsubmit="handleSubmit(event)">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea rows="4" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>

    <script>
    function handleSubmit(event) {
        event.preventDefault();

        alert("Thank you for contacting us! 😊 We will get back to you soon.");

        event.target.reset();
    }
    </script>
</div>

</div>

<footer>
    <p>© 2026 Ngul Yoen | Bhutan Banking Insights</p>
    <a href="Ngul Yoen.html">Home</a>
    <a href="About.html">About</a>
    <a href="Report.html">Report</a>
    <a href="Findings.html">Findings</a>
</footer>

</body>
</html>
